<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Jockey — Intern Collaboration Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg: #080d1a;
    --surface: #0f172a;
    --surface2: #1a2540;
    --border: rgba(255,255,255,0.07);
    --accent: #f59e0b;
    --accent2: #fbbf24;
    --accent-dim: rgba(245,158,11,0.12);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-soft: #94a3b8;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --sidebar-w: 240px;
    --radius: 14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;margin:0;padding:0;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
  h1,h2,h3,h4{font-family:'Syne',sans-serif}
  .hidden{display:none!important}

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:10px}

  /* ── TOAST ── */
  #toast-area{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
  .toast{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 18px;border-radius:10px;font-size:13.5px;color:var(--text);animation:slideIn .3s ease;max-width:300px}
  .toast.success{border-left-color:var(--green)}.toast.error{border-left-color:var(--red)}.toast.info{border-left-color:var(--blue)}
  @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes fadeOut{to{opacity:0;transform:translateX(30px)}}

  /* ══════════════════════════════════════
     LOGIN PAGE
  ══════════════════════════════════════ */
  #loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
  .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.08) 0%, transparent 60%),radial-gradient(ellipse at 70% 20%, rgba(59,130,246,0.06) 0%, transparent 50%)}
  .login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px}
  .login-card{position:relative;z-index:2;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:400px;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
  .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .login-logo-icon{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#000;font-size:16px}
  .login-logo span{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
  .login-logo span em{color:var(--accent);font-style:normal}
  .login-card h2{font-size:24px;font-weight:700;margin-bottom:4px}
  .login-card p{color:var(--text-muted);font-size:13px;margin-bottom:20px}
  .field-group{margin-bottom:14px}
  .field-group label{display:block;font-size:11px;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .field-group input,.field-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s;box-sizing:border-box}
  .field-group input:focus,.field-group select:focus{border-color:var(--accent)}
  .field-group select option{background:var(--surface2)}
  .btn-primary{width:100%;padding:11px;background:var(--accent);border:none;border-radius:9px;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;margin-top:3px}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
  .domain-note{font-size:11px;color:var(--text-muted);text-align:center;margin-top:12px}
  .domain-note span{color:var(--accent)}

  /* ══════════════════════════════════════
     APP LAYOUT
  ══════════════════════════════════════ */
  #appLayout{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow:hidden}
  .sidebar-header{padding:18px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-logo{display:flex;align-items:center;gap:10px}
  .sidebar-logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#000;font-size:14px;flex-shrink:0}
  .sidebar-logo span{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
  .sidebar-logo span em{color:var(--accent);font-style:normal}
  .sidebar-user{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--accent);flex-shrink:0}
  .sidebar-user-info{overflow:hidden}
  .sidebar-user-info .uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sidebar-user-info .urole{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
  .sidebar-nav{flex:1;padding:10px;min-height:0;overflow-y:auto;overflow-x:hidden}
  .nav-section-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:6px 10px 2px;font-weight:600}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all .18s;color:var(--text-soft);font-size:13.5px;font-weight:500;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--accent)}
  .nav-item svg{flex-shrink:0;opacity:.7;width:16px;height:16px}
  .nav-item.active svg{opacity:1}
  .nav-item.logout{color:var(--red)}
  .nav-item.logout:hover{background:rgba(239,68,68,0.1)}
  .sidebar-bottom{padding:8px;border-top:1px solid var(--border);flex-shrink:0}
  .main-content{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-width:0}
  .main-header{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
  .page-title h2{font-size:20px;font-weight:700;line-height:1}
  .page-title p{font-size:12px;color:var(--text-muted);margin-top:2px}
  .header-actions{display:flex;align-items:center;gap:8px}
  .icon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);transition:all .2s;position:relative}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .notif-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--accent);border-radius:50%;border:1.5px solid var(--bg);display:none}
  .notif-dot.visible{display:block}
  .page-body{padding:20px 24px;flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
  .page-body.chat-mode{padding:0;overflow:hidden}
  .section{display:none}
  .section.active{display:block}

  /* ── STAT CARDS ── */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;min-width:0}
  .stat-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.14)}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--radius) var(--radius) 0 0}
  .stat-card.amber::after{background:var(--accent)}.stat-card.green::after{background:var(--green)}.stat-card.blue::after{background:var(--blue)}.stat-card.purple::after{background:var(--purple)}
  .stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .stat-icon.amber{background:rgba(245,158,11,0.12);color:var(--accent)}.stat-icon.green{background:rgba(16,185,129,0.12);color:var(--green)}.stat-icon.blue{background:rgba(59,130,246,0.12);color:var(--blue)}.stat-icon.purple{background:rgba(139,92,246,0.12);color:var(--purple)}
  .stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;line-height:1}
  .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px}
  .stat-badge{position:absolute;top:14px;right:14px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
  .stat-badge.up{background:rgba(16,185,129,0.12);color:var(--green)}.stat-badge.down{background:rgba(239,68,68,0.12);color:var(--red)}

  /* ── CHARTS ── */
  .charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:20px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .chart-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text);font-family:'Syne',sans-serif}
  .chart-wrap{position:relative;height:180px}

  /* ── TABLES ── */
  .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
  .table-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
  .table-card-header h3{font-size:14px;font-weight:600}
  .btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
  .btn-accent{background:var(--accent);color:#000}.btn-accent:hover{background:var(--accent2)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-soft)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
  table{width:100%;border-collapse:collapse}
  thead tr{background:rgba(255,255,255,0.02)}
  th{text-align:left;padding:10px 20px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  td{padding:12px 20px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle}
  tr:hover td{background:rgba(255,255,255,0.02)}
  .table-scroll{overflow-x:auto}
  .table-wrapper{overflow-y:auto;max-height:280px}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:18px;font-size:10.5px;font-weight:600}
  .badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .badge-green{background:rgba(16,185,129,0.12);color:var(--green)}.badge-green::before{background:var(--green)}
  .badge-red{background:rgba(239,68,68,0.12);color:var(--red)}.badge-red::before{background:var(--red)}
  .badge-amber{background:rgba(245,158,11,0.12);color:var(--accent)}.badge-amber::before{background:var(--accent)}
  .badge-blue{background:rgba(59,130,246,0.12);color:var(--blue)}.badge-blue::before{background:var(--blue)}
  .badge-purple{background:rgba(139,92,246,0.12);color:var(--purple)}.badge-purple::before{background:var(--purple)}
  .badge-gray{background:rgba(255,255,255,0.06);color:var(--text-soft)}.badge-gray::before{background:var(--text-soft)}
  .action-btn{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
  .action-approve{background:rgba(16,185,129,0.12);color:var(--green)}.action-approve:hover{background:rgba(16,185,129,0.2)}
  .action-reject{background:rgba(239,68,68,0.1);color:var(--red)}.action-reject:hover{background:rgba(239,68,68,0.2)}
  .action-view{background:rgba(59,130,246,0.1);color:var(--blue)}.action-view:hover{background:rgba(59,130,246,0.2)}
  .action-edit{background:rgba(245,158,11,0.1);color:var(--accent)}.action-edit:hover{background:rgba(245,158,11,0.2)}
  .priority-high{color:var(--red);font-weight:600}.priority-medium{color:var(--accent);font-weight:600}.priority-low{color:var(--green);font-weight:600}

  /* ── SEARCH & FILTER ── */
  .table-tools{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01)}
  .search-input{flex:1;max-width:260px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
  .search-input:focus{border-color:var(--accent)}
  .filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
  .filter-select:focus{border-color:var(--accent)}

  /* ── PROGRESS BAR ── */
  .progress-bar{height:6px;background:var(--surface2);border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .4s}
  .progress-fill.green{background:var(--green)}.progress-fill.blue{background:var(--blue)}.progress-fill.red{background:var(--red)}

  /* ── AVATAR ── */
  .avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
  .avatar-group{display:flex;align-items:center}.avatar-group .avatar{border:2px solid var(--surface);margin-left:-8px}.avatar-group .avatar:first-child{margin-left:0}

  /* ══════════════════════════════════════
     CHAT MODULE
  ══════════════════════════════════════ */
  .chat-layout{display:grid;grid-template-columns:280px 1fr;height:100%;gap:0;background:var(--surface);overflow:hidden}
  .chat-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden;background:var(--surface)}
  .chat-sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;flex-shrink:0;font-family:'Syne',sans-serif}
  .chat-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .chat-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;box-sizing:border-box;transition:border .2s}
  .chat-search input:focus{border-color:var(--accent)}
  .chat-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;min-height:0}
  .chat-contact{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px}
  .chat-contact:hover,.chat-contact.active{background:var(--surface2)}
  .chat-contact .cav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;border:2px solid transparent}
  .chat-contact.active .cav{border-color:var(--accent)}
  .chat-contact .cinfo{flex:1;min-width:0}
  .chat-contact .cname{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-contact .clast{font-size:11.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .chat-unread{background:var(--accent);color:#000;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .chat-area{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0;background:var(--bg)}
  .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);min-height:58px}
  .chat-header .cav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
  .chat-header-info .cn{font-weight:600;font-size:14px}
  .chat-header-info .cs{font-size:12px;color:var(--green)}
  .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-muted)}
  .chat-empty .ce-icon{width:64px;height:64px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:4px}
  .chat-empty h4{font-size:16px;font-weight:600;color:var(--text-soft);font-family:'Syne',sans-serif}
  .chat-empty p{font-size:13px;text-align:center;max-width:220px}
  .chat-messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:0}
  .msg{display:flex;gap:8px;max-width:70%}
  .msg.me{align-self:flex-end;flex-direction:row-reverse}
  .msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;align-self:flex-end}
  .msg-bubble{padding:9px 14px;border-radius:14px;font-size:13.5px;line-height:1.55;max-width:100%;word-break:break-word;overflow-wrap:anywhere}
  .msg .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
  .msg.me .msg-bubble{background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.3);border-bottom-right-radius:4px;color:var(--text)}
  .msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;text-align:right}
  .msg .msg-time{text-align:left}
  .chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface)}
  .chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border .2s;box-sizing:border-box;resize:none;max-height:80px;min-height:44px;line-height:1.45;display:block}
  .chat-input:focus{border-color:var(--accent)}
  .send-btn{width:44px;height:44px;background:var(--accent);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#000;transition:all .2s;flex-shrink:0}
  .send-btn:hover{background:var(--accent2);transform:scale(1.05)}

  /* ══════════════════════════════════════
     MODAL
  ══════════════════════════════════════ */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 24px;width:440px;max-width:88vw;max-height:82vh;overflow-y:auto}
  .modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s;box-sizing:border-box}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:70px}
  .field select option{background:var(--surface2)}

  /* ══════════════════════════════════════
     CALENDAR
  ══════════════════════════════════════ */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:16px}
  .cal-day-header{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;padding:8px 0}
  .cal-day{background:var(--surface2);border:1px solid var(--border);border-radius:9px;min-height:80px;padding:8px;cursor:pointer;transition:border .2s}
  .cal-day:hover{border-color:var(--accent)}
  .cal-day.today{border-color:var(--accent);background:var(--accent-dim)}
  .cal-day.empty{background:transparent;border-color:transparent}
  .cal-date{font-size:12px;font-weight:600;margin-bottom:4px}
  .cal-day.today .cal-date{color:var(--accent)}
  .cal-event{font-size:10px;background:var(--blue);color:#fff;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-event.task{background:var(--accent);color:#000}
  .cal-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-month{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);width:32px;height:32px;cursor:pointer;font-size:14px;transition:all .2s}
  .cal-nav button:hover{border-color:var(--accent)}

  /* ── ATTENDANCE GRID ── */
  .attend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
  .attend-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
  .attend-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
  .attend-info .an{font-size:13.5px;font-weight:600}
  .attend-info .at{font-size:12px;color:var(--text-muted);margin-top:2px}

  /* ── GROUPS ── */
  .groups-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
  .group-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
  .group-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
  .group-card h4{font-size:14.5px;font-weight:600;margin-bottom:6px}
  .group-card p{font-size:12.5px;color:var(--text-muted);margin-bottom:14px}
  .group-meta{display:flex;align-items:center;justify-content:space-between}

  /* ── MEETINGS ── */
  .meetings-list{display:flex;flex-direction:column;gap:14px}
  .meet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:18px}
  .meet-time{text-align:center;flex-shrink:0;width:58px}
  .meet-time .mdate{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--accent);line-height:1}
  .meet-time .mmon{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
  .meet-divider{width:1px;height:50px;background:var(--border);flex-shrink:0}
  .meet-info{flex:1}
  .meet-info h4{font-size:15px;font-weight:600;margin-bottom:5px}
  .meet-info p{font-size:12.5px;color:var(--text-muted)}
  .meet-link{padding:8px 16px;border-radius:8px;background:rgba(59,130,246,0.12);color:var(--blue);font-size:12.5px;font-weight:600;border:1px solid rgba(59,130,246,0.2);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .meet-link:hover{background:rgba(59,130,246,0.2)}

  /* ── PRODUCTIVITY ── */
  .prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
  .prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .prod-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
  .prod-row:last-child{border-bottom:none}
  .prod-name{font-size:13.5px;font-weight:500}
  .prod-score{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}

  /* ── INTERN MY TASKS ── */
  .task-kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .kanban-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13.5px;display:flex;align-items:center;justify-content:space-between}
  .kanban-count{background:var(--surface2);border-radius:20px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .kanban-body{padding:10px;display:flex;flex-direction:column;gap:10px}
  .task-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s}
  .task-card:hover{border-color:rgba(255,255,255,0.12)}
  .task-card h5{font-size:13.5px;font-weight:600;margin-bottom:6px}
  .task-card p{font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.5}
  .task-card-meta{display:flex;align-items:center;justify-content:space-between}
  .task-due{font-size:11px;color:var(--text-muted)}

  /* ── NOTIFICATION PANEL ── */
  .notif-list{display:flex;flex-direction:column;gap:12px}
  .notif-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .2s}
  .notif-item:hover{border-color:rgba(255,255,255,0.1)}
  .notif-item.unread{border-left:2px solid var(--accent)}
  .notif-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
  .notif-body h5{font-size:13.5px;font-weight:600;margin-bottom:3px}
  .notif-body p{font-size:12.5px;color:var(--text-muted)}
  .notif-time{font-size:11px;color:var(--text-muted);margin-top:4px}

  /* ── REPORT SUBMIT ── */
  .report-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px}
  .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
  .upload-zone:hover{border-color:var(--accent)}
  .upload-zone p{font-size:13px;color:var(--text-muted);margin-top:8px}

  /* ── NOTIFICATION BELL GLOW ── */
  @keyframes bellGlow{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}}
  .notif-bell-active{border-color:var(--accent)!important;color:var(--accent)!important;animation:bellGlow 1.8s ease infinite}
  .notif-dot{display:none}
  .notif-dot.visible{display:block}

  /* ── NOTIFICATION POPUP ── */
  #notifPopup{position:fixed;top:60px;right:20px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,0.5);z-index:2000;display:none;overflow:hidden}
  #notifPopup.open{display:block;animation:slideIn .2s ease}
  .notif-popup-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .notif-popup-header span{font-size:13.5px;font-weight:600}
  .notif-popup-list{max-height:340px;overflow-y:auto}
  .notif-popup-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
  .notif-popup-item:hover{background:var(--surface2)}
  .notif-popup-item:last-child{border-bottom:none}
  .notif-popup-item.unread{border-left:2px solid var(--accent)}
  .notif-popup-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .notif-popup-body{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .notif-popup-footer{padding:10px 16px;border-top:1px solid var(--border);text-align:center}
  .notif-popup-footer a{font-size:12.5px;color:var(--accent);cursor:pointer;text-decoration:none}

  /* ── RESPONSIVE ── */
  @media(max-width:1200px){
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .charts-row{grid-template-columns:1fr}
  }
  @media(max-width:900px){
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .charts-row{grid-template-columns:1fr}
    .groups-grid{grid-template-columns:1fr 1fr}
    .task-kanban{grid-template-columns:1fr}
    .chat-layout{grid-template-columns:220px 1fr}
  }
  @media(max-width:680px){
    .stats-grid{grid-template-columns:1fr 1fr}
    .groups-grid{grid-template-columns:1fr}
    .chat-layout{grid-template-columns:1fr}
    .chat-sidebar{display:none}
  }
</style>
</head>

<script>
const API_URL = "http://127.0.0.1:8000";
let token="", currentRole="", currentUser="", currentSection="";
let currentUserId=null, selectedReceiverId=null, ws=null;
let allUsers=[], chatCharts={}, calDate=new Date();
let currentSheetId="";

const COLORS=["#f59e0b","#3b82f6","#10b981","#8b5cf6","#ef4444","#06b6d4"];

// ─── ROLE CHECKS ─────────────────────────────
function isAdmin(){ return currentRole==="admin"; }
function isSuperAdmin(){ return currentRole==="super_admin"; }
function isIntern(){ return currentRole==="intern"; }
function canManage(){ return isAdmin()||isSuperAdmin(); }

// ─── API HELPER ──────────────────────────────
async function api(path, method="GET", body=null){
  const opts={method,headers:{"Authorization":"Bearer "+token}};
  if(body){opts.headers["Content-Type"]="application/json";opts.body=JSON.stringify(body);}
  const res=await fetch(API_URL+path,opts);
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||"Request failed");}
  return res.json();
}

// ─── HELPERS ────────────────────────────────
function showToast(msg,type=""){
  const area=document.getElementById("toast-area");
  const t=document.createElement("div");t.className="toast "+type;t.textContent=msg;
  area.appendChild(t);
  setTimeout(()=>{t.style.animation="fadeOut .3s ease forwards";setTimeout(()=>t.remove(),300)},3500);
}
function openModal(id){document.getElementById(id).classList.remove("hidden");}
function closeModal(id){document.getElementById(id).classList.add("hidden");}
function statusBadge(s){
  const m={Pending:"badge-amber","In Progress":"badge-blue",Completed:"badge-green",Approved:"badge-green",Rejected:"badge-red",Present:"badge-green",Absent:"badge-red",Leave:"badge-purple"};
  return `<span class="badge ${m[s]||"badge-gray"}">${s}</span>`;
}
function prioritySpan(p){
  const m={High:"priority-high",Medium:"priority-medium",Low:"priority-low"};
  return `<span class="${m[p]||""}">${p}</span>`;
}
function roleLabel(r){return {admin:"admin",super_admin:"super admin",intern:"intern"}[r]||r;}
function roleBadge(r){
  const cls={admin:"badge-red",super_admin:"badge-purple",intern:"badge-blue"}[r]||"badge-gray";
  return `<span class="badge ${cls}">${roleLabel(r)}</span>`;
}
function initChart(id,type,labels,datasets,options={}){
  const ctx=document.getElementById(id);if(!ctx)return null;
  return new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8",font:{family:"DM Sans",size:12}}}},scales:type!=="doughnut"&&type!=="pie"?{x:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"#64748b"},grid:{color:"rgba(255,255,255,0.04)"}}}:{},...options}});
}
function filterTable(tbId,q){document.querySelectorAll("#"+tbId+" tr").forEach(r=>r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?"":"none");}
function filterCol(tbId,col,val){document.querySelectorAll("#"+tbId+" tr").forEach(r=>{if(!val){r.style.display="";return;}const c=r.querySelectorAll("td");r.style.display=(c[col]&&c[col].textContent.includes(val))?"":"none";});}

// ─── NAV CONFIG ──────────────────────────────
const svgDash=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`;
const svgUsers=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`;
const svgCand=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
const svgTask=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`;
const svgProj=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`;
const svgAtt=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const svgRep=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
const svgProd=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`;
const svgChat=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`;
const svgGrp=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>`;
const svgMeet=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
const svgCal=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const svgNotif=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`;

const ADMIN_NAV=[
  {section:"Main",items:[{id:"dashboard",label:"Dashboard",icon:svgDash}]},
  {section:"Manage",items:[
    {id:"users",label:"Users & Roles",icon:svgUsers},
    {id:"candidates",label:"Candidates",icon:svgCand},
    {id:"tasks",label:"Tasks",icon:svgTask},
    {id:"projects",label:"Projects",icon:svgProj},
    {id:"attendance",label:"Attendance",icon:svgAtt},
    {id:"reports",label:"Reports",icon:svgRep},
    {id:"productivity",label:"Productivity",icon:svgProd},
  ]},
  {section:"Collaborate",items:[
    {id:"chat",label:"Chat",icon:svgChat},
    {id:"groups",label:"Groups",icon:svgGrp},
    {id:"meetings",label:"Meetings",icon:svgMeet},

// ─── AUTH ────────────────────────────────────

async function doLogin(){
  const email=document.getElementById("loginEmail").value.trim();
  const password=document.getElementById("loginPassword").value.trim();
  if(!email){showToast("Please enter your email","error");return;}
  if(!password){showToast("Please enter your password","error");return;}
  try{
    const data=await api("/login","POST",{email,password});
    token=data.access_token; currentRole=data.role; currentUser=data.name; currentUserId=data.user_id;
    // Save session to localStorage so refresh doesn't log out
    localStorage.setItem("jj_token", token);
    localStorage.setItem("jj_role", currentRole);
    localStorage.setItem("jj_user", currentUser);
    localStorage.setItem("jj_uid", currentUserId);
    localStorage.setItem("jj_email", email);
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("appLayout").classList.remove("hidden");
    await loadAllUsers();
    initApp();
    connectWS(data.user_id);
    _lastNotifCount=-1; // force initial check
    setTimeout(pollNotifications,1000);
    showToast("Welcome back, "+currentUser+" 👋","success");
  }catch(e){ showToast("Login failed: "+e.message,"error"); }
}


function goAssignTask(email, name){
  navTo("tasks");
  setTimeout(()=>{
    openModal("taskModal");
    const sel = document.getElementById("tAssign");
    if(sel){
      for(let i=0;i<sel.options.length;i++){
        if(sel.options[i].value===email){ sel.selectedIndex=i; break; }
      }
    }
    const title = document.getElementById("tTitle");
    if(title) title.placeholder = "Task for "+name+"...";
    showToast("Assign a task to "+name,"info");
  }, 300);
}

function doLogout(){
  token=""; currentRole=""; currentUser=""; currentUserId=null;
  localStorage.removeItem("jj_token");
  localStorage.removeItem("jj_role");
  localStorage.removeItem("jj_user");
  localStorage.removeItem("jj_uid");
  localStorage.removeItem("jj_email");
  if(ws){try{ws.close();}catch(e){}ws=null;}
  Object.values(chatCharts).forEach(c=>c&&c.destroy&&c.destroy()); chatCharts={};
  document.getElementById("appLayout").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("loginName").value="";
  document.getElementById("loginEmail").value="";
  document.getElementById("loginPassword").value="";
  showToast("Signed out","info");
}

async function loadAllUsers(){
  try{allUsers=await api("/users");}catch(e){allUsers=[];}
}
async function populateAssignDropdown(){
  // Always fetch fresh users so newly approved candidates appear
  try{ allUsers = await api("/users"); }catch(e){}
  const sel=document.getElementById("tAssign"); if(!sel)return;
  const assignable=isAdmin()?allUsers.filter(u=>u.role!=="admin"):allUsers.filter(u=>u.role==="intern");
  sel.innerHTML=assignable.map(u=>`<option value="${u.email}">${u.name} (${u.role})</option>`).join("");
}

async function populateProjectDropdown(){
  const sel=document.getElementById("tProject"); if(!sel)return;
  try{
    const projects=await api("/projects");
    sel.innerHTML=`<option value="">-- Select Project --</option>`+
      projects.map(p=>`<option value="${p.name}">${p.name}</option>`).join("");
  }catch(e){ sel.innerHTML=`<option value="">-- Select Project --</option>`; }
}

function initApp(){
  const nav=isAdmin()?ADMIN_NAV:isSuperAdmin()?SUPERADMIN_NAV:INTERN_NAV;
  const initials=currentUser.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  document.getElementById("sidebarAvatar").textContent=initials;
  document.getElementById("sidebarName").textContent=currentUser;
  document.getElementById("sidebarRole").textContent=roleLabel(currentRole);
  const sidebarNav=document.getElementById("sidebarNav"); sidebarNav.innerHTML="";
  nav.forEach(sec=>{
    sidebarNav.innerHTML+=`<div class="nav-section-label">${sec.section}</div>`;
    sec.items.forEach(item=>sidebarNav.innerHTML+=`<button class="nav-item" id="nav_${item.id}" onclick="navTo('${item.id}')">${item.icon}<span>${item.label}</span></button>`);
  });
  navTo("dashboard");
  populateAssignDropdown();
  populateProjectDropdown();
}

function navTo(id){
  currentSection=id;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.id==="nav_"+id));
  const titles={dashboard:"Dashboard",users:"Users & Roles",candidates:"Candidates",tasks:"Tasks",projects:"Projects",attendance:"Attendance",reports:"Reports",productivity:"Productivity",chat:"Chat",groups:"Groups",meetings:"Meetings",calendar:"Calendar",notifications:"Notifications",mytasks:"My Tasks",settings:"Settings"};
  const subs={dashboard:"Overview of all activities",users:"Manage roles and permissions",candidates:"Manage applicants",tasks:"Assign and track tasks",projects:"Project progress",attendance:"Daily attendance",reports:"Work reports",productivity:"Performance metrics",chat:"Team messages",groups:"Project teams",meetings:"Scheduled meetings",calendar:"Events and schedule",notifications:"Alerts and updates",mytasks:"Your assigned tasks",settings:"Account, email & security settings"};
  document.getElementById("pageTitle").textContent=titles[id]||id;
  document.getElementById("pageSubtitle").textContent=subs[id]||"";
  Object.values(chatCharts).forEach(c=>c&&c.destroy&&c.destroy()); chatCharts={};
  // Remove chat-mode padding override when leaving chat
  if(id!=="chat") document.getElementById("mainContent").classList.remove("chat-mode");
  // Clean up dynamic modals when navigating away
  if(id!=="projects"){const m=document.getElementById("projectModal");if(m)m.remove();}
  const renders={dashboard:renderDashboard,users:renderUsers,candidates:renderCandidates,tasks:renderTasks,projects:renderProjects,attendance:renderAttendance,reports:renderReports,productivity:renderProductivity,chat:renderChat,groups:renderGroups,meetings:renderMeetings,calendar:renderCalendar,notifications:renderNotifications,mytasks:renderMyTasks,settings:renderSettings,changepassword:renderChangePassword};
  if(renders[id])renders[id]();
}

async function renderInternDashboard(){
  const myEmail=localStorage.getItem("jj_email")||"";
  let tasks=[], attendance=[], groups=[], notifications=[];
  try{tasks=await api("/tasks");}catch(e){}
  try{attendance=await api("/attendance");}catch(e){}
  try{groups=await api("/groups");}catch(e){}
  try{notifications=await api("/notifications");}catch(e){}

  const pending=tasks.filter(t=>t.status==="Pending").length;
  const inProg=tasks.filter(t=>t.status==="In Progress").length;
  const done=tasks.filter(t=>t.status==="Completed").length;
  const total=tasks.length;

  // Attendance stats (last 30 days)
  const present=attendance.filter(a=>a.status==="Present").length;
  const absent=attendance.filter(a=>a.status==="Absent").length;
  const leave=attendance.filter(a=>a.status==="Leave").length;
  const attTotal=attendance.length;
  const attScore=attTotal>0?Math.round(present/attTotal*100):0;
  const taskScore=total>0?Math.round(done/total*100):0;

  // My groups

function updatePermCount(){
  const count=document.querySelectorAll("#permModal input[type=checkbox]:checked").length;
  const el=document.getElementById("permCount");
  if(el) el.textContent=count+" selected";
}

function permSelectAll(checked){
  document.querySelectorAll("#permModal input[type=checkbox]").forEach(cb=>{
    cb.checked=checked;
    const label=cb.closest("label");
    if(label){
      label.style.borderColor=checked?"var(--accent)":"var(--border)";
      label.style.background=checked?"rgba(245,158,11,0.06)":"transparent";
    }
  });
  updatePermCount();
}

async function savePermissions(uid, name){
  const checked=Array.from(document.querySelectorAll("#permModal input[type=checkbox]:checked")).map(cb=>cb.value);
  const perms=checked.join(",");
  try{
    await api("/users/"+uid+"/permissions","PATCH",{permissions:perms});
    showToast("Permissions saved for "+name+"!","success");
    document.getElementById("permModal").remove();
    await loadAllUsers();
    renderUsers();
  }catch(e){showToast("Failed: "+e.message,"error");}
}

async function promoteUser(id,name){
  if(!confirm("Promote "+name+" to Super Admin?"))return;
  try{
    await api("/users/"+id+"/promote","PATCH");
    showToast(name+" is now Super Admin ⭐","success");
    await loadAllUsers();
    renderUsers();
    // Auto open permissions modal
    setTimeout(()=>{
      const users_list=document.querySelectorAll("tbody tr");
      showToast("Set permissions for "+name+" using the 🔧 button","info");
    },500);
  }
  catch(e){showToast("Failed: "+e.message,"error");}
}
async function demoteUser(id,name){
  if(!confirm("Demote "+name+" back to Intern?"))return;
  try{await api("/users/"+id+"/demote","PATCH");showToast(name+" demoted to Intern","info");await loadAllUsers();renderUsers();}
  catch(e){showToast("Failed: "+e.message,"error");}
}
async function deleteUser(id,name){
  if(!confirm("Delete user "+name+"? This cannot be undone."))return;
  try{
    await api("/users/"+id,"DELETE");
    showToast(name+" deleted","error");
    await loadAllUsers();
    populateAssignDropdown();
    renderUsers();
  }
  catch(e){showToast("Failed: "+e.message,"error");}
}

// ── CSV FILE UPLOAD ───────────────────────────
let csvRows=[], csvHeaders=[];

function handleCsvUpload(event){
  const file=event.target.files[0];
  if(!file){return;}
  if(!file.name.endsWith(".csv")){showToast("Please select a .csv file","error");return;}

  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const lines=text.trim().split("\n").map(line=>{
      const result=[]; let cur="", inQ=false;
      for(let ch of line){
        if(ch==='"'&&!inQ){inQ=true;continue;}
        if(ch==='"'&&inQ){inQ=false;continue;}
        if(ch===","&&!inQ){result.push(cur.trim());cur="";continue;}
        cur+=ch;
      }
      result.push(cur.trim());
      return result;
    });

    if(lines.length<2){showToast("CSV file is empty or has no data rows","error");return;}

    csvHeaders=lines[0];
    csvRows=lines.slice(1).filter(r=>r.some(c=>c));

    // Show preview panel
    const panel=document.getElementById("csvPreviewPanel");
    document.getElementById("csvPreviewStatus").textContent=`✅ ${csvRows.length} rows found in "${file.name}"`;

// ── GOOGLE SHEET SYNC ────────────────────────────
let sheetRows = [], sheetHeaders = [];

function extractSheetId(url){
  if(url.includes("/forms/d/e/")){
    return "";
  }
  const sheetMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(sheetMatch) return sheetMatch[1];
  const directMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)(?:\/|$|\?)/);
  return directMatch ? directMatch[1] : "";
}

async function syncGoogleForm(){
  const urlInput = document.getElementById("gsheetUrl");
  let url = urlInput?.value.trim();
  if(!url){ showToast("Paste a Google Sheet URL first","error"); return; }
  if(url.includes("/forms/d/e/")){
    const status = document.getElementById("syncStatus");
    status.innerHTML = `<span style="color:var(--red)">❌ This is a Google Form link, not a Google Sheets response spreadsheet.</span>
      <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
        Open the form, go to Responses → click the spreadsheet icon → copy the sheet URL here.
      </div>`;
    return;
  }

  const sheetId = extractSheetId(url);
  if(!sheetId){ showToast("Enter a valid Google Sheets URL","error"); return; }
  currentSheetId = sheetId;
  localStorage.setItem("gsheet_url", url);

  const status = document.getElementById("syncStatus");
  status.innerHTML = `<span style="color:var(--accent)">⏳ Fetching data from backend...</span>`;

  try{
    const response = await api(`/google-forms/responses?sheet_id=${encodeURIComponent(sheetId)}`);
    if(!response.responses || !response.responses.length){ throw new Error("No rows found in the sheet"); }

    sheetHeaders = Object.keys(response.responses[0]);
    sheetRows = response.responses.map(row => sheetHeaders.map(h => row[h] || ""));

    const preview = document.getElementById("sheetPreview");
    const previewLabel = document.getElementById("previewLabel");
    const previewHead = document.getElementById("previewHead");
    const previewBody = document.getElementById("previewBody");

    previewLabel.textContent = `✅ Fetched ${sheetRows.length} responses. Preview (first 5 rows):`;
    previewHead.innerHTML = `<tr>${sheetHeaders.map(h => `<th style="background:rgba(255,255,255,0.04);padding:6px 10px;font-size:11px;color:var(--text-muted);white-space:nowrap">${h}</th>`).join("")}</tr>`;
    previewBody.innerHTML = sheetRows.slice(0,5).map(r => `<tr>${r.map(c => `<td style="padding:5px 10px;border-top:1px solid var(--border);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${c||"—"}</td>`).join("")}</tr>`).join("");
    preview.style.display = "block";

    showColumnMapping();
    status.innerHTML = `<span style="color:var(--green)">✅ ${sheetRows.length} rows fetched. Map your columns below and click Import.</span>`;

  }catch(err){
    status.innerHTML = `<span style="color:var(--red)">❌ ${err.message}</span>
    <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
      Make sure your Google Sheet is published publicly and the link is a valid Google Sheets URL.
    </div>`;
  }
}

  const section = document.getElementById("columnMapSection");
  const grid = document.getElementById("columnMapGrid");

  const fields = [
    {key:"name",  label:"Full Name *",    required:true},

    {key:"phone", label:"Phone",           required:false},
    {key:"skill", label:"Skills / Role",   required:false},
  ];

  grid.innerHTML = fields.map(f=>`

      ${f.required?"":"<option value=''>— Skip —</option>"}
      ${sheetHeaders.map((h,i)=>{

async function importMappedData(){
  const nameCol  = parseInt(document.getElementById("map_name")?.value);
  const emailCol = parseInt(document.getElementById("map_email")?.value);

  const skillCol = document.getElementById("map_skill")?.value;

  if(isNaN(nameCol)  || document.getElementById("map_name")?.value  === ""){ showToast("Please map the Name column","error");  return; }
  if(isNaN(emailCol) || document.getElementById("map_email")?.value === ""){ showToast("Please map the Email column","error"); return; }

  const fieldMap = {

  };

  const status = document.getElementById("syncStatus");

async function updateCandidate(id,status){
  try{
    const c=await api("/candidates/"+id,"PATCH",{status});
    if(status==="Approved"){
      await loadAllUsers();
      populateAssignDropdown();

      // Get exact credentials generated by backend
      let jjEmail="", jjPass="Welcome@123";
      if(c.resume&&c.resume.startsWith("LOGIN:")){
        const parts=c.resume.replace("LOGIN:","").split("|PASS:");
        jjEmail=parts[0]||"";
        jjPass="123";
      }
      // Fallback: generate from name same way as backend
      if(!jjEmail){
        const nm=c.name.toLowerCase().split("").filter(ch=>(ch>="a"&&ch<="z")||ch===" ").join("").trim().split(" ");
        jjEmail=nm.length>=2?`${nm[0]}.${nm[nm.length-1]}@jobjockey.in`:`${nm[0]}@jobjockey.in`;
      }

      // Send welcome email with login credentials
      const emailBody=
        "Congratulations "+c.name+"!\n\n"+
        "You have been selected as an Intern for Job Jockey.\n\n"+
        "Your Login Credentials:\n"+
        "Email    : "+jjEmail+"\n"+
        "Password : 123 (same as all users)\n"+"\n\n"+
        "Please login using above credentials and change your password after first login.\n\n"+
        "We look forward to working with you!\n\n"+
        "Best regards,\n"+
        "Job Jockey Team";

      const emailSent=await sendEmailJS(
        c.email, c.name,
        "Congratulations! You are selected as Intern for Job Jockey",
        emailBody
      );

      showToast(
        emailSent
          ?`✅ ${c.name} approved! Email sent to ${c.email}`
          :`✅ ${c.name} approved! Setup EmailJS to send emails automatically`,
        "success"
      );

      alert(
        `✅ ${c.name} is now an Intern!\n\n`+
        `Platform Login:\n`+
        `📧 Email    : ${jjEmail}\n`+
        `🔑 Password : ${jjPass}\n\n`+
        (emailSent
          ?`📬 Welcome email sent to: ${c.email}`
          :`⚠️ Email not sent — go to Email Settings in sidebar to configure EmailJS`)
      );

    } else {
      showToast("Candidate "+status.toLowerCase(),"info");
    }
    renderCandidates();
  }
  catch(e){showToast("Failed: "+e.message,"error");}
}

  if(!confirm("Approve "+ids.length+" candidates?"))return;

  for(const id of ids){

  showToast(done+" candidates approved!","success");
  await loadAllUsers();

          </div>
          <span style="font-size:12px;font-weight:700;color:${p.color};min-width:32px">${p.progress}%</span>
        </div>
      </td>
      <td>${statusBadge(p.status)}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        ${canManage()?`<button class="action-btn action-edit" onclick="openEditProject(${p.id},'${p.name.replace(/'/g,"\'")}','${(p.description||"").replace(/'/g,"\'")}',${p.progress},'${p.status}','${p.color}')">✏️ Edit</button>`:""}
        ${isAdmin()?`<button class="action-btn action-reject" onclick="deleteProject(${p.id})">🗑</button>`:""}
      </td>
    </tr>`).join("")||`<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">No projects yet</td></tr>`}
    </tbody></table>
  </div>`;

  // Highlight default color
  selectPjColor("#3b82f6");
}

function selectPjColor(col){
  document.getElementById("pjColor").value=col;
  document.querySelectorAll("#projectModal [data-col]").forEach(el=>{
    el.style.border=el.dataset.col===col?"3px solid white":"2px solid transparent";
    el.style.transform=el.dataset.col===col?"scale(1.2)":"scale(1)";
  });
}

function openEditProject(id,name,desc,progress,status,color){
  document.getElementById("epId").value=id;
  document.getElementById("epName").value=name;
  document.getElementById("epDesc").value=desc;
  document.getElementById("epProgress").value=progress;
  document.getElementById("epProgressVal").textContent=progress+"%";
  document.getElementById("epProgressBar").style.width=progress+"%";
  document.getElementById("epProgressBar").style.background=color;
  document.getElementById("epStatus").value=status;
  openModal("editProjectModal");
}

function quickProgress(id, current, color){
  // Inline quick-update popup on the progress bar click
  const val=prompt("Set progress % (0-100):", current);
  if(val===null) return;
  const num=Math.min(100,Math.max(0,parseInt(val)||0));
  const status=num===100?"Completed":num===0?"Pending":"In Progress";
  api("/projects/"+id,"PATCH",{progress:num,status}).then(()=>{
    showToast("Progress updated to "+num+"%","success");
    renderProjects();
  }).catch(e=>showToast("Failed: "+e.message,"error"));
}

async function saveProjectEdit(){
  const id=document.getElementById("epId").value;
  const name=document.getElementById("epName").value.trim();
  if(!name){showToast("Enter project name","error");return;}
  const progress=parseInt(document.getElementById("epProgress").value)||0;
  const status=document.getElementById("epStatus").value;
  const desc=document.getElementById("epDesc").value||"";
  // Auto-set status based on progress if not manually changed
  const finalStatus=progress===100?"Completed":status;
  try{
    await api("/projects/"+id,"PATCH",{name,description:desc,progress,status:finalStatus});
    closeModal("editProjectModal");
    showToast("Project updated!","success");
    renderProjects();
  }catch(e){showToast("Failed: "+e.message,"error");}
}

async function createProject(){
  const name=document.getElementById("pjName")?.value.trim();
  if(!name){showToast("Enter project name","error");return;}
  const color=document.getElementById("pjColor")?.value||"#3b82f6";
  try{
    await api("/projects","POST",{name,description:document.getElementById("pjDesc")?.value||"",status:"In Progress",progress:0,color});
    closeModal("projectModal");showToast("Project created!","success");renderProjects();
  }catch(e){showToast("Failed: "+e.message,"error");}
}
async function deleteProject(id){
  if(!confirm("Delete this project?"))return;
  try{await api("/projects/"+id,"DELETE");showToast("Project deleted","error");renderProjects();}
  catch(e){showToast("Failed","error");}
}

// Intern-specific: personal attendance calendar
let internAttDate=new Date();
async function renderInternAttendance(){
  let data=[];
  try{data=await api("/attendance");}catch(e){}
  const todayISO=new Date().toISOString().split("T")[0];
  const todayRec=data.find(a=>a.date===todayISO);
  const todayStatus=todayRec?todayRec.status:"Not Marked";

  // Build map for quick lookup
  const attMap={};
  data.forEach(a=>attMap[a.date]=a.status);

  // Calendar for internAttDate month
  const yr=internAttDate.getFullYear();
  const mo=internAttDate.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(); // 0=Sun
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const monthName=internAttDate.toLocaleDateString("en-IN",{month:"long",year:"numeric"});

  // Stats for current month
  const monthPrefix=`${yr}-${String(mo+1).padStart(2,"0")}`;
  const monthData=data.filter(a=>a.date.startsWith(monthPrefix));
  const mp=monthData.filter(a=>a.status==="Present").length;
  const ma=monthData.filter(a=>a.status==="Absent").length;
  const ml=monthData.filter(a=>a.status==="Leave").length;

  // Build calendar cells
  let cells="";
  const dayHeaders=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="cal-day-header">${d}</div>`).join("");
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=iso===todayISO;
    const st=attMap[iso];
    const bg=st==="Present"?"background:rgba(16,185,129,0.15);border-color:var(--green)":
               st==="Absent"?"background:rgba(239,68,68,0.12);border-color:var(--red)":
               st==="Leave"?"background:rgba(139,92,246,0.12);border-color:var(--purple)":"";
    const dot=st==="Present"?`<div style="margin-top:4px;font-size:18px;line-height:1">✓</div><div style="font-size:10px;color:var(--green)">Present</div>`:
               st==="Absent"?`<div style="margin-top:4px;font-size:18px;line-height:1">✗</div><div style="font-size:10px;color:var(--red)">Absent</div>`:
               st==="Leave"?`<div style="margin-top:4px;font-size:18px;line-height:1">🏖</div><div style="font-size:10px;color:var(--purple)">Leave</div>`:"";
    cells+=`<div class="cal-day ${isToday?"today":""}" style="${bg}text-align:center;min-height:70px;display:flex;flex-direction:column;align-items:center;padding:6px 4px">
      <div class="cal-date" style="${isToday?"color:var(--accent);font-weight:700":""}">${d}</div>
      ${dot}
    </div>`;
  }

  document.getElementById("mainContent").innerHTML=`
  <!-- Today status + mark button -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text-muted)">📅 Today: <strong style="color:${todayStatus==="Present"?"var(--green)":todayStatus==="Absent"?"var(--red)":todayStatus==="Leave"?"var(--purple)":"var(--text-muted)"}">${todayStatus}</strong></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span style="font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.25)">✓ ${mp} Present</span>
        <span style="font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25)">✗ ${ma} Absent</span>
        <span style="font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(139,92,246,0.1);color:var(--purple);border:1px solid rgba(139,92,246,0.25)">🏖 ${ml} Leave</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      ${todayStatus==="Not Marked"?`<button class="btn-sm btn-accent" onclick="markMyAttendance()">✓ Mark Present Today</button>`:`<span style="font-size:13px;color:var(--text-muted)">Already marked for today</span>`}
      <div style="display:flex;align-items:center;gap:8px;">
        <input id="leaveDateInput" type="date" value="${todayISO}" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:13px;">
        <button class="btn-sm btn-outline" onclick="markMyLeave()">🏖 Request Leave</button>
      </div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="chart-card">
    <div class="cal-controls">
      <div class="cal-month">${monthName}</div>
      <div class="cal-nav">
        <button onclick="internAttDate=new Date(internAttDate.getFullYear(),internAttDate.getMonth()-1,1);renderInternAttendance()">‹</button>
        <button onclick="internAttDate=new Date();renderInternAttendance()">Today</button>
        <button onclick="internAttDate=new Date(internAttDate.getFullYear(),internAttDate.getMonth()+1,1);renderInternAttendance()">›</button>
      </div>
    </div>
    <div class="cal-grid">
      ${dayHeaders}
      ${cells}
    </div>
  </div>`;
}
async function markAttendanceFor(email,status,date){
  try{await api("/attendance","POST",{email,status,date});showToast(email.split("@")[0]+" → "+status,"success");renderAttendance();}
  catch(e){showToast("Failed: "+e.message,"error");}
}
async function markMyAttendance(){
  const date=new Date().toISOString().split("T")[0];
  try{await api("/attendance","POST",{status:"Present",date});showToast("Attendance marked!","success");renderAttendance();}
  catch(e){showToast("Failed: "+e.message,"error");}
}
async function markMyLeave(){
  const input = document.getElementById("leaveDateInput");
  if(!input) return showToast("Leave date input not found","error");
  const date = input.value;
  if(!date) return showToast("Choose a date for leave","error");

  try{
    await api("/attendance","POST",{status:"Leave",date});
    showToast(`Leave requested for ${date}`,"success");
    renderAttendance();
  }catch(e){
    showToast("Failed: "+e.message,"error");
  }

async function exportAttendance(){
  try{

function handleReportFile(e){
  const file=e.target.files[0]; if(!file)return;
  reportFileName=file.name;
  const reader=new FileReader();
  reader.onload=function(ev){
    reportFileData=ev.target.result.split(",")[1]; // base64 only
    document.getElementById("fileLabel").textContent="File selected";
    const prev=document.getElementById("filePreview");
    document.getElementById("filePreviewName").textContent=file.name+" ("+Math.round(file.size/1024)+" KB)";
    prev.style.display="flex";
    showToast("File ready: "+file.name,"success");
  };
  reader.readAsDataURL(file);
}

function clearReportFile(){
  reportFileData=""; reportFileName="";
  document.getElementById("rFileInput").value="";
  document.getElementById("fileLabel").textContent="Click to choose file or drop here";
  document.getElementById("filePreview").style.display="none";
}

function downloadReportFile(name, b64){
  try{
    const bytes=atob(b64);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    const blob=new Blob([arr]);
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  }catch(e){showToast("Could not download file","error");}
}

async function submitReport(){
  const title=document.getElementById("rTask")?.value.trim();
  if(!title){showToast("Enter a task name","error");return;}
  try{
    await api("/reports","POST",{
      title,
      description:document.getElementById("rDesc")?.value||"",
      file_name:reportFileName||"",
      file_data:reportFileData||""
    });
    showToast("Report submitted!","success");
    document.getElementById("rTask").value="";
    document.getElementById("rDesc").value="";
    clearReportFile();
    renderReports();
  }catch(e){showToast("Failed: "+e.message,"error");}
}
async function reviewReport(id){
  try{await api("/reports/"+id,"PATCH");showToast("Report reviewed!","success");renderReports();}
  catch(e){showToast("Failed","error");}
}
async function exportReports(){
  try{
    const data=await api("/reports");
    if(!data.length){showToast("No reports to export","info");return;}
    const csv=["ID,Title,Submitted By,Description,File,Reviewed,Date",...data.map(r=>`${r.id},"${r.title}","${r.submitted_by||""}","${(r.description||"").replace(/"/g,"'")}","${r.file_name||""}",${r.reviewed},${r.submitted_at?new Date(r.submitted_at).toLocaleDateString():""}`)].join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="reports.csv";a.click();
    showToast("Reports exported!","success");
  }catch(e){showToast("Export failed","error");}
}

async function exportProductivity(){

  try{ stats=await api("/productivity"); }catch(e){ showToast("Failed to fetch data","error"); return; }
  if(!stats.length){ showToast("No data to export","info"); return; }
  const grade=s=>s>=90?"A+":s>=80?"A":s>=70?"B":s>=60?"C":s>=50?"D":"F";
  const header="Rank,Name,Email,Role,Tasks Total,Tasks Done,In Progress,Pending,Task Score,Present,Absent,Leave,Att Score,Reports Submitted,Reports Reviewed,Overall Score,Grade";
  const rows=stats.map((s,i)=>`${i+1},"${s.name}",${s.email},${s.role},${s.tasks_total},${s.tasks_done},${s.tasks_in_progress},${s.tasks_pending},${s.task_score}%,${s.present},${s.absent},${s.leave},${s.att_score}%,${s.reports_submitted},${s.reports_reviewed},${s.overall_score}%,${grade(s.overall_score)}`);

  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="productivity_report.csv"; a.click();
  showToast("Exported "+stats.length+" interns!","success");
}

// ─── NOTIFICATION POLLING & POPUP ────────────
let _lastNotifCount=0;
let _notifPopupOpen=false;

function playNotifSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(660,ctx.currentTime+0.12);
    gain.gain.setValueAtTime(0.18,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.35);
  }catch(e){}
}

async function pollNotifications(){
  if(!token) return;
  try{
    const data=await api("/notifications");
    const unread=data.filter(n=>!n.read).length;
    const bell=document.getElementById("notifBellBtn");
    const dot=document.getElementById("notifDot");
    if(bell){
      bell.classList.toggle("notif-bell-active",unread>0);
    }
    if(dot){
      dot.classList.toggle("visible",unread>0);
    }
    // Play sound and show mini-toast for new notifications
    if(unread>_lastNotifCount && _lastNotifCount>=0 && document.visibilityState!=="hidden"){
      playNotifSound();
      const newest=data.find(n=>!n.read);
      if(newest){
        showToast(`🔔 ${newest.title}`,"info");
      }
    }
    _lastNotifCount=unread;
    // Update popup list if open
    if(_notifPopupOpen) buildNotifPopupList(data);
  }catch(e){}
}

function buildNotifPopupList(data){
  const list=document.getElementById("notifPopupList");
  if(!list) return;
  const recent=data.slice(0,8);
  if(!recent.length){
    list.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">No notifications yet</div>`;
    return;
  }
  list.innerHTML=recent.map(n=>`
    <div class="notif-popup-item ${n.read?"":"unread"}" onclick="markNotifRead(${n.id})">
      <div class="notif-popup-title">${n.icon||"🔔"} ${n.title}</div>
      <div class="notif-popup-body">${n.body||""}</div>
    </div>`).join("");
}

async function markNotifRead(id){
  try{await api("/notifications/"+id+"/read","PATCH");}catch(e){}
  pollNotifications();
}

async function toggleNotifPopup(){
  const popup=document.getElementById("notifPopup");
  if(!popup) return;
  _notifPopupOpen=!_notifPopupOpen;
  popup.classList.toggle("open",_notifPopupOpen);
  if(_notifPopupOpen){
    try{const data=await api("/notifications");buildNotifPopupList(data);}catch(e){}
  }
}

function closeNotifPopup(){
  _notifPopupOpen=false;
  const popup=document.getElementById("notifPopup");
  if(popup) popup.classList.remove("open");
}

// Close popup when clicking outside
document.addEventListener("click",function(e){
  const popup=document.getElementById("notifPopup");
  const bell=document.getElementById("notifBellBtn");
  if(_notifPopupOpen && popup && bell && !popup.contains(e.target) && !bell.contains(e.target)){
    closeNotifPopup();
  }
});

setInterval(pollNotifications, 30000);

      </div>`;

}

function gmRenderTags(){
  const bar=document.getElementById("gmTagBar");
  const count=document.getElementById("gmCount");
  if(!bar) return;
  count.textContent=gmAdded.length;
  if(!gmAdded.length){
    bar.innerHTML=`<span style="color:var(--text-muted);font-size:12px;padding:4px 0">No members added yet</span>`;
    return;
  }
  bar.innerHTML=gmAdded.map((email,idx)=>{
    const u=gmAll.find(u=>u.email===email);
    const name=u?u.name:email.split("@")[0];
    const firstName=name.split(" ")[0];
    const col=COLORS[idx%COLORS.length];
    return `<span onclick="gmRemove('${email}')" title="Click to remove ${name}"
      style="display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;background:${col}18;border:1px solid ${col}44;color:${col};font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin:2px"
      onmouseover="this.style.background='${col}33';this.style.borderColor='${col}88'"
      onmouseout="this.style.background='${col}18';this.style.borderColor='${col}44'">
      <span style="width:20px;height:20px;border-radius:50%;background:${col}33;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800">${firstName.slice(0,2).toUpperCase()}</span>
      ${firstName}
      <span style="font-size:11px;opacity:0.6">✕</span>
    </span>`;
  }).join("");
}

function gmRenderList(query=""){
  const avail=document.getElementById("gmAvailList");
  if(!avail) return;
  const q=query.toLowerCase();
  const filtered=gmAll.filter(u=>
    (!q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || u.role.toLowerCase().includes(q))
  );
  if(!filtered.length){
    avail.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">No users match "${query}"</div>`;
    return;
  }
  avail.innerHTML=filtered.map((u,i)=>{
    const isAdded=gmAdded.includes(u.email);
    const col=COLORS[gmAll.indexOf(u)%COLORS.length];
    return `<div onclick="${isAdded?`gmRemove('${u.email}')`:`gmAdd('${u.email}')`}"
      style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:3px;transition:background .15s;border:1px solid ${isAdded?col+'44':'transparent'};background:${isAdded?col+'0d':'transparent'}"
      onmouseover="this.style.background='${isAdded?col+'1a':'rgba(255,255,255,0.04)'}'"
      onmouseout="this.style.background='${isAdded?col+'0d':'transparent'}'">
      <div style="width:36px;height:36px;border-radius:50%;background:${col}22;color:${col};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${u.name.slice(0,2).toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${u.name}</div>
        <div style="font-size:11.5px;color:var(--text-muted)">${u.email} · ${u.role}</div>
      </div>
      <div style="font-size:13px;font-weight:700;flex-shrink:0;width:24px;text-align:center;color:${isAdded?'var(--red)':'var(--green)'}">${isAdded?'✕':'+'}</div>
    </div>`;
  }).join("");
}

function gmRender(q=""){ gmRenderTags(); gmRenderList(q); }
function gmFilter(q){ gmRenderList(q.toLowerCase()); }
function gmAdd(email){ if(!gmAdded.includes(email)) gmAdded.push(email); gmRender(document.getElementById("gmSearch")?.value||""); }
function gmRemove(email){ gmAdded=gmAdded.filter(e=>e!==email); gmRender(document.getElementById("gmSearch")?.value||""); }
function gmAddAll(){ gmAll.forEach(u=>{if(!gmAdded.includes(u.email))gmAdded.push(u.email);}); gmRender(); }
function gmRemoveAll(){ gmAdded=[]; gmRender(); }
function gmAddFiltered(){
  const q=(document.getElementById("gmSearch")?.value||"").toLowerCase();
  gmAll.filter(u=>u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)||u.role.toLowerCase().includes(q)).forEach(u=>{if(!gmAdded.includes(u.email))gmAdded.push(u.email);});
  gmRender(q);
}

// CALENDAR
// ════════════════════════════════════════════
async function renderCalendar(){
  // Fetch all events from backend
  let meetings=[], tasks=[], candidates=[];
  try{
    [meetings, tasks, candidates] = await Promise.all([
      api("/meetings"),
      api("/tasks"),
      isAdmin()||isSuperAdmin() ? api("/candidates") : Promise.resolve([])
    ]);
  }catch(e){}

  // Build event map: "YYYY-MM-DD" -> [{type, label, color}]
  const events = {};
  const addEvent = (date, type, label, color) => {
    if(!date) return;
    const key = date.slice(0,10);
    if(!events[key]) events[key] = [];
    events[key].push({type, label, color});
  };

  meetings.forEach(m => addEvent(m.date, "meeting", "📅 "+m.title, "#f59e0b"));
  tasks.forEach(t => { if(t.deadline && t.deadline!=="TBD") addEvent(t.deadline, "task", "📋 "+t.title, t.status==="Completed"?"#10b981":t.priority==="High"?"#ef4444":"#3b82f6"); });
  candidates.filter(c=>c.status==="Approved").forEach(c => { if(c.applied_at) addEvent(c.applied_at.slice(0,10), "candidate", "✅ "+c.name+" joined", "#10b981"); });

  const y=calDate.getFullYear(), m=calDate.getMonth();
  const monthName=calDate.toLocaleString("en",{month:"long",year:"numeric"});
  const firstDay=new Date(y,m,1).getDay(), daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();

  let cells="";
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday = d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const dateKey = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayEvents = events[dateKey]||[];
    const dots = dayEvents.slice(0,3).map(e=>`<div style="width:6px;height:6px;border-radius:50%;background:${e.color};flex-shrink:0"></div>`).join("");
    const eventList = dayEvents.map(e=>`<div style="font-size:9.5px;padding:1px 4px;border-radius:4px;background:${e.color}22;color:${e.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-top:1px">${e.label}</div>`).join("");
    cells+=`
    <div class="cal-day ${isToday?"today":""} ${dayEvents.length?"has-events":""}" style="cursor:${dayEvents.length?"pointer":"default"};${dayEvents.length?"background:rgba(245,158,11,0.04)":""}" ${dayEvents.length?`onclick="showCalDayEvents('${dateKey}',${JSON.stringify(dayEvents).replace(/"/g,'&quot;')})"`:""}>
      <div class="cal-date" style="${isToday?"color:var(--accent);font-weight:800":""}">${d}</div>

async function renderMyTasks(){
  let data=[];
  try{data=await api("/tasks");}catch(e){}
  const pending=data.filter(t=>t.status==="Pending");
  const inProg=data.filter(t=>t.status==="In Progress");
  const done=data.filter(t=>t.status==="Completed");
  function card(t){return `<div class="task-card"><h5>${t.title}</h5><p>${t.description||""}</p>
    <div class="task-card-meta">${prioritySpan(t.priority)}<span class="task-due">📅 ${t.deadline||"TBD"}</span></div>
    <div style="margin-top:10px"><select style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12.5px" onchange="updateTaskStatus(${t.id},this.value);setTimeout(renderMyTasks,600)">
      ${["Pending","In Progress","Completed"].map(s=>`<option ${t.status===s?"selected":""}>${s}</option>`).join("")}
    </select></div></div>`;}
  document.getElementById("mainContent").innerHTML=`
  <div class="task-kanban">
    <div class="kanban-col"><div class="kanban-header" style="border-top:2px solid var(--accent)">Pending <span class="kanban-count">${pending.length}</span></div><div class="kanban-body">${pending.map(card).join("")||`<div style="padding:16px;color:var(--text-muted);font-size:12px">No pending tasks</div>`}</div></div>
    <div class="kanban-col"><div class="kanban-header" style="border-top:2px solid var(--blue)">In Progress <span class="kanban-count">${inProg.length}</span></div><div class="kanban-body">${inProg.map(card).join("")||`<div style="padding:16px;color:var(--text-muted);font-size:12px">None in progress</div>`}</div></div>
    <div class="kanban-col"><div class="kanban-header" style="border-top:2px solid var(--green)">Completed <span class="kanban-count">${done.length}</span></div><div class="kanban-body">${done.map(card).join("")||`<div style="padding:16px;color:var(--text-muted);font-size:12px">None completed yet</div>`}</div></div>
  </div>`;
}

async function sendEmailJS(toEmail, toName, subject, message){
  const svc = localStorage.getItem("ejs_service")  || "lbdt qhfe fjjs pfhx";
  const tpl = localStorage.getItem("ejs_template") || "template_9fdt08j";
  const key = localStorage.getItem("ejs_pubkey")   || "hGVTdWAxjoz4EdTlk";

  try{

      showToast("EmailJS not loaded. Check internet connection.","error");

    await emailjs.send(svc, tpl, {
      to_email:  toEmail,
      to_name:   toName || toEmail.split("@")[0],
      subject:   subject,
      message:   message,
      from_name: "Job Jockey Platform"
    });
    return true;
  }catch(e){
    console.error("EmailJS error:", e);
    showToast("Email failed: "+(e.text||e.message||"Unknown error"),"error");
    return false;
  }

async function sendCustomEmail(){
  const to      = document.getElementById("mailTo")?.value.trim();
  const name    = document.getElementById("mailName")?.value.trim();
  const subject = document.getElementById("mailSubject")?.value.trim();
  const body    = document.getElementById("mailBody")?.value.trim();
  if(!to)     { showToast("Enter recipient email","error"); return; }
  if(!subject){ showToast("Enter a subject","error"); return; }
  if(!body)   { showToast("Write a message","error"); return; }
  const status = document.getElementById("mailStatus");
  status.innerHTML = `<span style="color:var(--accent)">⏳ Sending to ${to}...</span>`;
  const ok = await sendEmailJS(to, name, subject, body);
  if(ok){
    status.innerHTML = `<span style="color:var(--green)">✅ Email sent to ${to}!</span>`;
    showToast("Email sent!","success");
    document.getElementById("mailTo").value="";
    document.getElementById("mailName").value="";
    document.getElementById("mailSubject").value="";
    document.getElementById("mailBody").value="";
  } else {
    status.innerHTML = `<span style="color:var(--red)">❌ Failed. Check EmailJS config in settings.</span>`;
  }
}

async function changePassword(){
  const current = document.getElementById("cpCurrent")?.value.trim();
  const newPass = document.getElementById("cpNew")?.value.trim();
  const confirm = document.getElementById("cpConfirm")?.value.trim();
  const status  = document.getElementById("cpStatus");

  if(!current){ showToast("Enter your current password","error"); return; }
  if(!newPass) { showToast("Enter a new password","error"); return; }
  if(newPass.length < 4){ showToast("Password must be at least 4 characters","error"); return; }
  if(newPass !== confirm){ showToast("Passwords do not match","error"); return; }
  if(current === newPass){ showToast("New password must be different from current","error"); return; }

  status.innerHTML = `<span style="color:var(--accent)">⏳ Updating...</span>`;

  try{
    await api("/users/me/password","PATCH",{current_password:current, new_password:newPass});
    status.innerHTML = `<span style="color:var(--green)">✅ Password changed successfully!</span>`;
    showToast("Password updated!","success");
    document.getElementById("cpCurrent").value="";
    document.getElementById("cpNew").value="";
    document.getElementById("cpConfirm").value="";
    // Update saved password hint
    setTimeout(()=>{
      status.innerHTML=`<span style="color:var(--green)">✅ Password changed! Use your new password next time you login.</span>`;
    },1000);
  }catch(e){
    status.innerHTML = `<span style="color:var(--red)">❌ ${e.message}</span>`;
    showToast("Failed: "+e.message,"error");
  }
}

async function submitAddCandidate(){
  const name  = document.getElementById("acName")?.value.trim();
  const email = document.getElementById("acEmail")?.value.trim();
  if(!name) { showToast("Enter candidate name","error"); return; }
  if(!email){ showToast("Enter candidate email","error"); return; }
  const status = document.getElementById("acStatus");
  status.innerHTML=`<span style="color:var(--accent)">⏳ Adding...</span>`;
  try{
    await api("/candidates","POST",{
      name,
      email,
      phone:     document.getElementById("acPhone")?.value||"",
      skill:     document.getElementById("acSkill")?.value||"",
      state:     document.getElementById("acState")?.value||"",
      college:   document.getElementById("acCollege")?.value||"",
      edu_domain:document.getElementById("acEdu")?.value||"",
      duration:  document.getElementById("acDuration")?.value||"",
      resume:    document.getElementById("acResume")?.value||""
    });
    showToast(name+" added as candidate!","success");
    document.getElementById("addCandModal").remove();
    renderCandidates();
  }catch(e){
    status.innerHTML=`<span style="color:var(--red)">❌ ${e.message}</span>`;
  }
}
